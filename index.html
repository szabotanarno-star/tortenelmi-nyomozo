<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Történelmi nyomozó</title>
<style>
body {font-family: Georgia, serif; margin:0; padding:20px; background:#f1f5f9;}
.container {display:grid; grid-template-columns:1.2fr 0.8fr; gap:20px;}
.card {background:white; padding:16px; border-radius:16px;}
.sticky {position:sticky; top:10px; max-height:40vh; overflow:auto;}
</style>
</head>
<body>

<h1>A két példány rejtélye</h1>

<div class="container">

<div>
<div class="card sticky">
<h2>Információkártyák</h2>
<div id="cards"></div>
</div>
</div>

<div>
<div class="card">
<textarea id="input" style="width:100%;height:100px;"></textarea>
<button onclick="next()">Következő</button>
</div>
</div>

</div>

<script>
const cards = [
"A dokumentumot zárt tárgyaláson vitatták meg.",
"Két példány készült.",
"A módosítás csak a hivatalos példányban van.",
"A diktálás során két ember volt jelen."
];

let index=1;

function render(){
 document.getElementById("cards").innerHTML =
  cards.slice(0,index).reverse().map(c=>"<div>"+c+"</div>").join("");
}

function next(){
 if(index<cards.length) index++;
 render();
}

render();
</script>

</body>
</html>
